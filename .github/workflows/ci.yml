name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -W clippy::all -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - shruti-engine
          - shruti-dsp
          - shruti-plugin
          - shruti-ui
          - shruti-session
          - shruti-ai
          - shruti-instruments
          - shruti
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run unit tests for ${{ matrix.package }}
        run: cargo test -p ${{ matrix.package }} --lib --bins --benches --examples

  integration:
    name: Integration Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - shruti-instruments
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run integration tests for ${{ matrix.package }}
        run: cargo test -p ${{ matrix.package }} --test '*'

  e2e:
    name: E2E Tests
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run end-to-end tests
        run: cargo test -p shruti --test integration

  coverage:
    name: Coverage (50% threshold)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --workspace --fail-under 50 --exclude-files "vendor/*" "src/main.rs" "src/bin/*"

  build:
    name: Build Release
    needs: [check, test, integration, e2e, security, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install audio dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: shruti-linux-amd64
          path: target/release/shruti
